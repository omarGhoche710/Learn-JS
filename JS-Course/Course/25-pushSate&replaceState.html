<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn JavaScript</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <p id="l1">Trigger One</p>
    <p><a id="l2" href="#">Trigger Two</a></p>
    <p><button id="l3">Trigger Three</button></p>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("l1").addEventListener("click", goOne);
        document.getElementById("l2").addEventListener("click", goTwo);
        document.getElementById("l3").addEventListener("click", goThree);
        console.log(history.state);
      });

      function goOne(ev) {
        ev.stopPropagation();
        history.replaceState({ id: 1 }, "", "/hello");
        document.title = "new string";
      }

      function goTwo(ev) {
        ev.preventDefault();
        history.pushState({ id: 234 }, "", "/add.html");
        document.title = "Add Page";
      }

      function goThree(ev) {
        ev.preventDefault();
        let num = Math.floor(Math.random() * 10000);
        history.pushState({ id: num }, "", `#${num}`);
      }
    </script>
    <script src="js/main.js"></script>
  </body>
</html>
