<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        row-gap: 10px;
        width: 500px;
      }

      .card {
        width: 50%;
        padding: 10px;
        background-color: #fff;
        border-radius: 5px;
      }

      .card input {
        padding: 8px;
        width: 70%;
      }

      .card button {
        background-color: #9c27b0;
        color: white;
        padding: 8px;
        margin-left: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .listTasks .task {
        padding: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #777;
      }

      .taskName {
        cursor: pointer;
      }

      .completed {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <input type="text" id="task" />
        <button id="btnAdd">Add</button>
      </div>
      <div class="card listTasks"></div>
    </div>
    <script type="module" src="./js/App.js"></script>
  </body>
</html>
