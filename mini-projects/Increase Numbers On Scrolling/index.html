  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
      <style>
        section {
          height: 500px;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .one {
          background-color: #eee;
        }

        .two {
          background-color: #ddd;
        }

        section:nth-child(3) {
          background-color: #eee;
        }

        section:nth-child(3) > div {
          display: flex;
          justify-content: space-between;
          gap: 20px;
        }

        section:last-child {
          background-color: #ddd;
        }
      </style>
    </head>
    <body>
      <section class="one">Section One</section>
      <section class="two">Section Two</section>
      <section class="three">
        <div class="nums">
          <div class="num" data-goal="100">0</div>
          <div class="num" data-goal="500">0</div>
          <div class="num" data-goal="300">0</div>
        </div>
      </section>
      <section class="four">Section Four</section>

      <script>
        const section = document.querySelector('.three');
        const numEls = document.querySelectorAll('.nums .num');

        let started = false;

        window.addEventListener('scroll', () => {
          if (!started && window.scrollY >= section.offsetTop) {
            started = true;
            numEls.forEach((el) => startCount(el))
          }
        });

        function startCount(el) {
          const goal = Number(el.dataset.goal);
          let count = Number(el.textContent);

          let id = setInterval(() => {
            count++;
            el.textContent = count;
            if (count >= goal) {
              clearInterval(id);
            }
          }, 2000 / goal);
        }
        
      </script>
    </body>
  </html>
